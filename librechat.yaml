version: 1.3.10

cache: true

interface:
  modelSelect: true
  parameters: true
  presets: true
  bookmarks: true
  fileSearch: true
  agents:
    use: true

endpoints:
  custom:
    - name: 'OpenRouter'
      apiKey: 'user_provided'
      baseURL: 'https://openrouter.ai/api/v1'
      models:
        default: ['meta-llama/llama-3-70b-instruct']
        fetch: true
      titleConvo: true
      titleModel: 'meta-llama/llama-3-70b-instruct'
      dropParams: ['stop']
      modelDisplayLabel: 'OpenRouter'

    - name: 'OpenAI'
      apiKey: 'user_provided'
      baseURL: 'https://api.openai.com/v1'
      models:
        default: ['gpt-4', 'gpt-4o', 'gpt-4o-mini']
        fetch: true
      titleConvo: true
      titleModel: 'gpt-4o-mini'
      modelDisplayLabel: 'OpenAI'

    - name: 'Anthropic'
      apiKey: 'user_provided'
      baseURL: 'https://api.anthropic.com/v1'
      models:
        default: ['claude-3.5-sonnet', 'claude-3-opus']
        fetch: true
      titleConvo: true
      titleModel: 'claude-3.5-sonnet'
      modelDisplayLabel: 'Anthropic'

    - name: 'Custom OpenAI'
      apiKey: 'user_provided'
      baseURL: 'user_provided'
      models:
        default: ['gpt-4', 'gpt-4o']
        fetch: false
      titleConvo: true
      titleModel: 'gpt-4o-mini'
      modelDisplayLabel: 'Custom OpenAI'
